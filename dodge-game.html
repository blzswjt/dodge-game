<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>躲避白点</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoi5oiR55qE5b6L5LiJIiwic2hvcnRfbmFtZSI6IuaIkeeahOW+i+S4oiIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMWExYTJlIiwidGhlbWVfY29sb3IiOiIjMDBkMmZmIn0=">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  color: #fff;
  overflow: hidden;
  user-select: none;
}
#header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 10px;
  font-size: 14px;
}
#score { color: #00d2ff; font-weight: bold; font-size: 18px; }
#best { color: #ffd700; font-size: 14px; }
canvas {
  border: 1px solid #333;
  border-radius: 8px;
  background: #0f0f23;
  box-shadow: 0 0 30px rgba(0,210,255,0.15);
}
#overlay {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  pointer-events: none;
}
#overlay.active { pointer-events: auto; }
#overlay h2 { font-size: 22px; color: #00d2ff; }
#overlay p { font-size: 13px; color: #aaa; }
#overlay .final { font-size: 16px; color: #ffd700; }
#startBtn {
  padding: 10px 32px;
  background: #00d2ff;
  color: #0f0f23;
  border: none;
  border-radius: 20px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: transform .15s;
  box-shadow: 0 0 15px rgba(0,210,255,0.4);
}
#startBtn:hover { transform: scale(1.08); }
#startBtn:active { transform: scale(0.95); }
#installBtn {
  padding: 6px 18px;
  background: #222;
  color: #fff;
  border: 1px solid #555;
  border-radius: 16px;
  font-size: 12px;
  cursor: pointer;
}
#installBtn:hover { background: #333; }
#controls {
  margin-top: 8px;
  font-size: 11px;
  color: #555;
}
#dpad {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 150px;
  height: 150px;
}
#dpad button {
  position: absolute;
  width: 48px;
  height: 48px;
  border: none;
  border-radius: 12px;
  background: rgba(0,210,255,0.25);
  color: #fff;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
#dpad button:active { background: rgba(0,210,255,0.6); }
#dpad .up    { top: 0; left: 51px; }
#dpad .down  { bottom: 0; left: 51px; }
#dpad .left  { top: 51px; left: 0; }
#dpad .right { top: 51px; right: 0; }
@media (pointer: coarse) {
  #dpad { display: block; }
}
</style>
</head>
<body>

<div id="header">
  <span>⏱ 时间: <span id="score">0.0</span>s</span>
  <span id="best">🏆 最佳: 0.0s</span>
  <button id="installBtn" style="display:none" title="安装到桌面">📱 安装到桌面</button>
</div>

<div style="position:relative; display:inline-block;">
  <canvas id="game" width="400" height="500" tabindex="0"></canvas>
  <div id="overlay" class="active">
    <h2>🎮 躲避白点</h2>
    <p>鼠标/触摸拖动 或 方向键移动蓝色方块</p>
    <p>躲避所有白色点！</p>
    <button id="startBtn" onclick="restart()">开始游戏</button>
    <p style="margin-top: 8px; font-size: 11px; color: #666;">或按空格键开始</p>
  </div>
</div>

<div id="controls">鼠标/触摸移动 | 方向键/WASD | 空格开始 | ESC 暂停</div>

<div id="dpad">
  <button class="up" data-dir="up">▲</button>
  <button class="down" data-dir="down">▼</button>
  <button class="left" data-dir="left">◀</button>
  <button class="right" data-dir="right">▶</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const startBtn = document.getElementById('startBtn');

const W = canvas.width, H = canvas.height;

let player, dots, running, startTime, elapsed, bestTime, animId, paused;
let keys = {};
let mouseTarget = null; // 鼠标/触摸目标位置

bestTime = parseFloat(localStorage.getItem('dodgeBest') || '0');
bestEl.textContent = `🏆 最佳: ${bestTime.toFixed(1)}s`;

// 玩家
function createPlayer() {
  return { x: W / 2, y: H - 60, size: 14, speed: 4.5, color: '#00d2ff' };
}

// 白点
function spawnDot() {
  const side = Math.random() * 4 | 0;
  let x, y, vx, vy;
  const baseSpeed = 1.2 + Math.min(elapsed / 15, 3.5); // 随时间加速
  const sp = baseSpeed * (0.6 + Math.random() * 0.8);

  if (side === 0) { // 上
    x = Math.random() * W; y = -10;
    vx = (Math.random() - 0.5) * sp; vy = sp;
  } else if (side === 1) { // 下
    x = Math.random() * W; y = H + 10;
    vx = (Math.random() - 0.5) * sp; vy = -sp;
  } else if (side === 2) { // 左
    x = -10; y = Math.random() * H;
    vx = sp; vy = (Math.random() - 0.5) * sp;
  } else { // 右
    x = W + 10; y = Math.random() * H;
    vx = -sp; vy = (Math.random() - 0.5) * sp;
  }
  const r = 3 + Math.random() * 3;
  dots.push({ x, y, vx, vy, r });
}

function init() {
  player = createPlayer();
  dots = [];
  elapsed = 0;
  startTime = performance.now();
  running = true;
  paused = false;
  overlay.classList.remove('active');
  overlay.innerHTML = '';
  spawnTimer = 0;
}

let spawnTimer = 0;

function update(dt) {
  if (!running || paused) return;

  elapsed = (performance.now() - startTime) / 1000;
  scoreEl.textContent = elapsed.toFixed(1);

  // 鼠标/触摸跟随
  if (mouseTarget) {
    const dx = mouseTarget.x - player.x;
    const dy = mouseTarget.y - player.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 2) {
      const sp = Math.min(player.speed * 1.5, dist);
      player.x += (dx / dist) * sp;
      player.y += (dy / dist) * sp;
    }
  }

  // 键盘移动
  if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y -= player.speed;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += player.speed;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;

  player.x = Math.max(player.size, Math.min(W - player.size, player.x));
  player.y = Math.max(player.size, Math.min(H - player.size, player.y));

  // 生成白点 - 随时间增多
  const spawnRate = Math.max(2, 12 - elapsed / 5);
  spawnTimer += dt;
  if (spawnTimer > spawnRate) {
    spawnDot();
    spawnTimer = 0;
  }

  // 更新白点
  for (let i = dots.length - 1; i >= 0; i--) {
    const d = dots[i];
    d.x += d.vx;
    d.y += d.vy;

    // 超出范围移除
    if (d.x < -30 || d.x > W + 30 || d.y < -30 || d.y > H + 30) {
      dots.splice(i, 1);
      continue;
    }

    // 碰撞检测
    const dx = d.x - player.x;
    const dy = d.y - player.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < d.r + player.size * 0.7) {
      gameOver();
      return;
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // 背景网格
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  for (let i = 0; i < W; i += 30) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke(); }
  for (let i = 0; i < H; i += 30) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke(); }

  // 白点
  for (const d of dots) {
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fill();
    // 发光效果
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r + 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fill();
  }

  // 玩家
  const hs = player.size;
  ctx.fillStyle = player.color;
  ctx.shadowColor = player.color;
  ctx.shadowBlur = 15;
  ctx.fillRect(player.x - hs, player.y - hs, hs * 2, hs * 2);
  ctx.shadowBlur = 0;

  // 玩家边框
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(player.x - hs, player.y - hs, hs * 2, hs * 2);
}

let lastTime = 0;
function loop(time) {
  const dt = (time - lastTime) / (1000 / 60);
  lastTime = time;
  update(dt);
  draw();
  if (running) animId = requestAnimationFrame(loop);
}

function gameOver() {
  running = false;
  cancelAnimationFrame(animId);

  if (elapsed > bestTime) {
    bestTime = elapsed;
    localStorage.setItem('dodgeBest', bestTime.toFixed(1));
    bestEl.textContent = `🏆 最佳: ${bestTime.toFixed(1)}s`;
  }

  // 闪烁效果
  ctx.fillStyle = 'rgba(255,0,0,0.3)';
  ctx.fillRect(0, 0, W, H);

  overlay.classList.add('active');
  overlay.innerHTML = `
    <h2>💥 游戏结束</h2>
    <p class="final">坚持了 ${elapsed.toFixed(1)} 秒</p>
    ${elapsed >= bestTime ? '<p style="color:#ffd700">🎉 新纪录！</p>' : ''}
    <button id="startBtn" onclick="restart()">再来一次</button>
  `;
}

function restart() {
  init();
  lastTime = performance.now();
  animId = requestAnimationFrame(loop);
  canvas.focus();
}

// 事件
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  
  // 按空格开始游戏（包括重新开始）
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    if (!running) {
      console.log('空格开始游戏');
      restart();
    }
    return;
  }
  
  if (e.key === 'Escape' && running) {
    paused = !paused;
    if (paused) {
      overlay.classList.add('active');
      overlay.innerHTML = `<h2>⏸ 暂停</h2><p>按 ESC 继续</p>`;
    } else {
      overlay.classList.remove('active');
      overlay.innerHTML = '';
      startTime = performance.now() - elapsed * 1000;
    }
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

startBtn.addEventListener('click', restart);

// PWA 安装
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
let deferredPrompt;
const installBtn = document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'block';
});
installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBtn.style.display = 'none';
});

// 鼠标控制
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

canvas.addEventListener('mousemove', e => {
  if (!running || paused) return;
  mouseTarget = getCanvasPos(e);
});
canvas.addEventListener('mouseleave', () => { mouseTarget = null; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!running || paused) return;
  mouseTarget = getCanvasPos(e);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!running || paused) return;
  mouseTarget = getCanvasPos(e);
}, { passive: false });
canvas.addEventListener('touchend', () => { mouseTarget = null; });

// 虚拟方向键
const dpadKeys = { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' };
document.querySelectorAll('#dpad button').forEach(btn => {
  const dir = dpadKeys[btn.dataset.dir];
  const start = () => { keys[dir] = true; };
  const end = () => { keys[dir] = false; };
  btn.addEventListener('mousedown', start);
  btn.addEventListener('mouseup', end);
  btn.addEventListener('mouseleave', end);
  btn.addEventListener('touchstart', e => { e.preventDefault(); start(); }, { passive: false });
  btn.addEventListener('touchend', e => { e.preventDefault(); end(); }, { passive: false });
});

// 初始绘制
player = createPlayer();
dots = [];
elapsed = 0;
running = false;
draw();

// 确保页面可以接收键盘事件
canvas.focus();
document.body.focus();
</script>
</body>
</html>
